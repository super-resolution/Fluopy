name: Test with latest python

on:
  schedule:
    - cron: "47 4 * * 4"
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    name: "Tests with linux, py${{ matrix.python-version }}, pip"

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.14"]

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install --groups test
    - name: "Run tests with coverage"
      run: coverage run -m pytest --junitxml=./test-results-${{ env.PYTHON_VERSION }}.xml
    - name: "Prepare coverage reports"
      run: coverage xml
    - name: "Check coverage"
      run: coverage report --fail-under=60
